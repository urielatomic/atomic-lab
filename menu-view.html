<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f5;font-family:'DM Sans',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
.menu-wrap{max-width:480px;margin:0 auto;min-height:100vh;background:#fff;box-shadow:0 0 40px rgba(0,0,0,.1)}
.menu-hero{padding:36px 24px 28px;text-align:center;position:relative}
.menu-logo{width:64px;height:64px;border-radius:16px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;font-weight:800;font-family:'Manrope',sans-serif}
.menu-name{font-family:'Manrope',sans-serif;font-size:24px;font-weight:800;letter-spacing:-.02em}
.menu-tag{font-size:13px;opacity:.75;margin-top:4px}
.menu-body{padding:0 0 80px}
.cat-nav{display:flex;gap:8px;overflow-x:auto;padding:16px 20px;border-bottom:1px solid #f0f0f0;scrollbar-width:none;-ms-overflow-style:none}
.cat-nav::-webkit-scrollbar{display:none}
.cat-chip{padding:6px 16px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #e5e5e5;background:#fff;color:#666;white-space:nowraw;transition:all .15s;font-family:'DM Sans',sans-serif}
.cat-chip.active,.cat-chip:hover{color:#fff;border-color:transparent}
.section{padding:20px 20px 4px}
.section-title{font-family:'Manrope',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#aaa;margin-bottom:14px}
.item{display:flex;align-items:flex-start;gap:12px;padding:14px 0;border-bottom:1px solid #f5f5f5}
.item:last-child{border-bottom:none}
.item-photo{width:54px;height:54px;object-fit:cover;border-radius:8px;flex-shrink:0}
.item-emoji{font-size:22px;width:36px;text-align:center;flex-shrink:0;margin-top:1px}
.item-left{flex:1}
.item-name{font-size:14px;font-weight:600;color:#111;line-height:1.3}
.item-desc{font-size:12px;color:#999;margin-top:3px;line-height:1.4}
.item-price{font-family:'Manrope',sans-serif;font-size:14px;font-weight:700;flex-shrink:0;margin-top:2px}
.footer{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #f0f0f0;padding:12px 20px;display:flex;align-items:center;justify-content:center;gap:8px}
.footer-logo{width:20px;height:20px;border-radius:4px;background:#E53030;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff}
.footer-text{font-size:11px;color:#bbb}
.footer-text a{color:#E53030;text-decoration:none;font-weight:600}
.empty-state{text-align:center;padding:60px 20px;color:#ccc}
.empty-state .icon{font-size:40px;margin-bottom:12px}
.loading{text-align:center;padding:80px 20px;color:#ccc;font-size:14px}
.not-found{text-align:center;padding:80px 24px}
.not-found h2{font-family:'Manrope',sans-serif;font-size:20px;font-weight:700;color:#333;margin-bottom:8px}
.not-found p{font-size:14px;color:#999;line-height:1.6}
.not-found a{display:inline-flex;align-items:center;gap:6px;margin-top:20px;background:#E53030;color:#fff;padding:10px 20px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:600;font-family:'Manrope',sans-serif}
</style>
</head>
<body>
<div class="menu-wrap">
  <div id="menu-content"><div class="loading">Cargando menú...</div></div>
  <div class="footer">
    <div class="footer-logo">⚛</div>
    <div class="footer-text">Menú creado con <a href="/atomic-lab/menulab.html">MenuLab</a></div>
  </div>
</div>

<script>
function getDB() {
  try { return JSON.parse(localStorage.getItem('menulab_db') || '{"users":{},"menus":{}}'); }
  catch(e) { return {users:{},menus:{}}; }
}

const params = new URLSearchParams(window.location.search);
const uid = params.get('u');
const _dParam = params.get('d');
if (_dParam) {
  try { window._urlMenu = JSON.parse(decodeURIComponent(escape(atob(_dParam)))); }
  catch(e) { window._urlMenu = null; }
}

function renderMenu() {
  const content = document.getElementById('menu-content');
  if (!uid && !window._urlMenu) {
    content.innerHTML = `<div class="not-found"><h2>Menú no encontrado</h2><p>El link es inválido o el menú no existe.</p><a href="/atomic-lab/menulab.html">Crear mi menú gratis →</a></div>`;
    return;
  }

  let email;
  try { email = atob(uid.replace(/-/g,'+').replace(/_/g,'/')); }
  catch(e) { email = null; }

  const db = getDB();
  const menu = window._urlMenu || (email ? db.menus[email] : null);

  if (!menu || !menu.items || !menu.items.length) {
    content.innerHTML = `
      <div class="not-found">
        <div style="font-size:48px;margin-bottom:16px">📋</div>
        <h2>Menú no disponible en este dispositivo</h2>
        <p>Este menú está guardado en otro dispositivo.<br>Si sos el dueño del restaurante, inicia sesión en MenuLab para editarlo.</p>
        <a href="/atomic-lab/menulab.html">Ir a MenuLab →</a>
      </div>`;
    return;
  }

  const color = menu.color || '#E53030';
  const cats = [...new Set(menu.items.map(i => i.cat))];
  let activecat = cats[0];

  document.title = (menu.restoName || 'Menú digital') + ' — MenuLab';

  content.innerHTML = `
    <div class="menu-hero" style="background:linear-gradient(160deg,${color},${adjustColor(color,-30)})">
      <div class="menu-logo" style="background:rgba(255,255,255,.2);font-size:26px">🍽️</div>
      <div class="menu-name" style="color:#fff">${menu.restoName || 'Menú digital'}</div>
      <div class="menu-tag" style="color:rgba(255,255,255,.8)">${menu.tagline || ''}</div>
    </div>
    <div class="menu-body">
      <div class="cat-nav" id="cat-nav">
        ${cats.map(cat => `<div class="cat-chip ${cat===activecat?'active':''}" onclick="filterCat('${cat}')" data-cat="${cat}" style="${cat===activecat?'background:'+color+';':''}"> ${cat}</div>`).join('')}
      </div>
      <div id="items-area">
        ${renderSection(menu.items, cats, activecat, color)}
      </div>
    </div>
  `;

  window.filterCat = function(cat) {
    activecat = cat;
    document.querySelectorAll('.cat-chip').forEach(c => {
      c.classList.toggle('active', c.dataset.cat === cat);
      c.style.background = c.dataset.cat === cat ? color : '';
      c.style.color = c.dataset.cat === cat ? '#fff' : '';
    });
    document.getElementById('items-area').innerHTML = renderSection(menu.items, cats, cat, color);
  };
}

function renderSection(items, cats, active, color) {
  if (active === 'all') {
    return cats.map(cat => `
      <div class="section">
        <div class="section-title">${cat}</div>
        ${items.filter(i=>i.cat===cat).map(item=>renderItem(item,color)).join('')}
      </div>
    `).join('');
  }
  const filtered = items.filter(i => i.cat === active);
  if (!filtered.length) return '<div class="empty-state"><div class="icon">🍽️</div><p>No hay platos en esta categoría</p></div>';
  return `<div class="section"><div class="section-title">${active}</div>${filtered.map(i=>renderItem(i,color)).join('')}</div>`;
}

function renderItem(item, color) {
  return `<div class="item">
    ${item.photo ? '<img src="'+item.photo+'" class="item-photo">' : '<div class="item-emoji">'+( item.emoji||'🍽️')+'</div>'}
    <div class="item-left">
      <div class="item-name">${item.name}</div>
      ${item.desc?`<div class="item-desc">${item.desc}</div>`:''}
    </div>
    <div class="item-price" style="color:${color}">${item.price}</div>
  </div>`;
}

function adjustColor(hex, amt) {
  try {
    const n = parseInt(hex.replace('#',''),16);
    const r = Math.max(0,Math.min(255,(n>>16)+amt));
    const g = Math.max(0,Math.min(255,((n>>8)&0xff)+amt));
    const b = Math.max(0,Math.min(255,(n&0xff)+amt));
    return '#'+((1<<24)|(r<<16)|(g<<8)|b).toString(16).slice(1);
  } catch(e) { return hex; }
}

renderMenu();
</script>
</body>
</html>
